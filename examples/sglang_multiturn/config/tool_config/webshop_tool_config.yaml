tools:
  # ──────────────────────────────────────────────────────────────────────
  # Tool 1 — EnvStep
  # Single interface to interact with the WebShop environment.
  # ──────────────────────────────────────────────────────────────────────
  - class_name: "verl.tools.webshop_tool.EnvStepTool"
    config:
      type: native
    tool_schema:
      type: "function"
      function:
        name: "EnvStep"
        description: >
          Interact with the WebShop e-commerce environment.
        parameters:
          type: "object"
          properties:
            action:
              type: "string"
              description: >
                The exact action string to execute. Example: "search[gold flipflops]" or "click[Buy Now]".
          required: ["action"]

  # ──────────────────────────────────────────────────────────────────────
  # Tool 2 — CalcWebShopReward  (internal — NOT exposed to the model)
  # Scores the agent's final answer after <FINISHED> is emitted.
