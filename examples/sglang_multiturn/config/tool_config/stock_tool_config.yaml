# tools_config_stock.yaml
#
# Tool configuration for the stock candlestick identification agent.
#
# Three external data-fetching tools (FinQuery, Search, TickerChart) plus
# one reward tool (calc_stock_reward) that scores the model's final answer.
#
# The agent loop (StockChartAgentLoop) calls external tools whenever the
# model emits a <tool_call> block, and calls calc_stock_reward once the
# model emits <FINISHED>.

tools:

  # ──────────────────────────────────────────────────────────────────────
  # External tool 1 — FinQuery
  # Used by the model to look up stock codes, prices, financial metrics, etc.
  # ──────────────────────────────────────────────────────────────────────
  - class_name: "verl.tools.stock_external_tools.FinQueryTool"
    config:
      type: native
    tool_schema:
      type: "function"
      function:
        name: "FinQuery"
        description: >
          金融查询工具。用于获取股票代码、股票名称、财务数据、行情数据等金融信息。
          当需要根据股票名称查代码、或根据特征筛选股票时使用本工具。
          输入自然语言描述的查询内容，例如：'茅台的股票代码'、'近5天涨幅前10的A股'。
        parameters:
          type: "object"
          properties:
            query:
              type: "string"
              description: "自然语言描述的金融查询，包含具体股票名称或指标，例如：'茅台的股票代码'"
          required: ["query"]

  # ──────────────────────────────────────────────────────────────────────
  # External tool 2 — Search
  # Used by the model to search for news, industry info, company backgrounds.
  # ──────────────────────────────────────────────────────────────────────
  # - class_name: "verl.tools.stock_external_tools.SearchTool"
  #   config:
  #     type: native
  #   tool_schema:
  #     type: "function"
  #     function:
  #       name: "Search"
  #       description: >
  #         搜索工具。用于搜索热点新闻、公司背景、行业资讯等信息。
  #         当需要通过行业线索、公司新闻或概念板块辅助判断股票时使用本工具。
  #         输入关键词或自然语言短语，不超过5个关键词，例如：'新能源汽车龙头股'。
  #       parameters:
  #         type: "object"
  #         properties:
  #           query:
  #             type: "string"
  #             description: "搜索关键词或自然语言短语，例如：'半导体行业最新动态'"
  #         required: ["query"]

  # ──────────────────────────────────────────────────────────────────────
  # External tool 3 — TickerChart
  # Used by the model to fetch a K-line chart image for a candidate stock
  # and date range so it can visually compare against the user's screenshot.
  # ──────────────────────────────────────────────────────────────────────
  # - class_name: "verl.tools.stock_external_tools.TickerChartTool"
  #   config:
  #     type: native
  #     # Directory where fetched chart images will be cached during rollout
  #     images_dir: "/tmp/verl_stock_charts"
  #   tool_schema:
  #     type: "function"
  #     function:
  #       name: "TickerChart"
  #       description: >
  #         A股K线图获取工具。根据股票代码和时间范围获取K线图片，
  #         可用于将候选股票的K线形态与用户截图进行视觉对比。
  #         返回图片供模型直接查看。
  #       parameters:
